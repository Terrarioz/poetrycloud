<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗云 · Poetry Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --pale-gold: #e8d5a0;
    --ink: #1a1a2e;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  /* ========== INTRO SCREEN ========== */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #fff;
    animation: introBgShift 6s ease-in-out infinite alternate;
  }

  @keyframes introBgShift {
    0%   { background: linear-gradient(135deg, #f9f6f0, #e8dfd0, #f5f0e8); }
    25%  { background: linear-gradient(200deg, #ede8f5, #f0e8f0, #e8f0f5); }
    50%  { background: linear-gradient(300deg, #f5ede0, #faf0e8, #f0e8e0); }
    75%  { background: linear-gradient(60deg,  #e8f5f0, #f0f5e8, #e8ede8); }
    100% { background: linear-gradient(135deg, #f5e8f0, #ede8f5, #f0f0e8); }
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: transparent;
    background: linear-gradient(135deg, #8b7355, #c9a84c, #6b5a3e, #a08040);
    -webkit-background-clip: text;
    background-clip: text;
    opacity: 0;
    transform: translateY(30px) scale(0.95);
    animation: revealTitle 2.5s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    text-align: center;
    line-height: 1.1;
  }

  .intro-sub {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 200;
    letter-spacing: 0.8em;
    color: #7a6545;
    opacity: 0;
    transform: translateY(20px);
    animation: revealTitle 2s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
    margin-top: 0.4em;
    text-align: center;
  }

  @keyframes revealTitle {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .intro-line {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin: 2rem auto;
    animation: expandLine 1.5s ease-out 2s forwards;
  }

  @keyframes expandLine {
    to { width: min(400px, 80vw); }
  }

  #enter-btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.4em;
    color: #8b7355;
    background: transparent;
    border: 1px solid rgba(180, 150, 80, 0.5);
    padding: 0.8em 2.5em;
    cursor: pointer;
    opacity: 0;
    transform: translateY(15px);
    animation: revealBtn 1.5s ease-out 3.2s forwards;
    transition: all 0.4s ease;
    text-transform: uppercase;
  }

  #enter-btn:hover {
    background: rgba(180, 150, 80, 0.1);
    border-color: #c9a84c;
    color: #c9a84c;
    letter-spacing: 0.6em;
  }

  @keyframes revealBtn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== MAIN APP ========== */
  #app {
    position: fixed; inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }

  #app.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* Space sky — deep void, Liu Cixin cosmos */
  #sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 55% at 50% 100%, rgba(38,14,5,0.90) 0%, transparent 52%),
      radial-gradient(ellipse 70% 45% at 12% 22%,  rgba(6,22,48,0.75) 0%, transparent 60%),
      radial-gradient(ellipse 60% 55% at 88% 12%,  rgba(28,6,36,0.65) 0%, transparent 55%),
      linear-gradient(180deg, #010109 0%, #02040d 35%, #060310 65%, #0c0508 100%);
    overflow: hidden;
  }

  /* Milky way band */
  .milkyway {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 220% 16% at 50% 40%,
      rgba(190,165,120,0.042) 0%, rgba(130,105,75,0.018) 45%, transparent 70%);
    transform: rotate(-16deg) scaleX(1.5);
    filter: blur(22px);
  }

  /* Stars */
  .star-layer {
    position: absolute; inset: -10%;
    background-image:
      radial-gradient(1px 1px at 8%  12%, rgba(255,248,228,0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 38%, rgba(255,255,255,0.80) 0%, transparent 100%),
      radial-gradient(2px 2px at 38%  4%, rgba(255,244,205,0.90) 0%, transparent 100%),
      radial-gradient(1px 1px at 53% 22%, rgba(195,215,255,0.75) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 58%, rgba(255,255,255,0.85) 0%, transparent 100%),
      radial-gradient(2px 2px at 83%  9%, rgba(255,238,195,0.80) 0%, transparent 100%),
      radial-gradient(1px 1px at 14% 68%, rgba(255,255,255,0.70) 0%, transparent 100%),
      radial-gradient(1px 1px at 29% 83%, rgba(215,228,255,0.60) 0%, transparent 100%),
      radial-gradient(1px 1px at 58% 77%, rgba(255,255,255,0.75) 0%, transparent 100%),
      radial-gradient(2px 2px at 91% 43%, rgba(255,245,215,0.85) 0%, transparent 100%),
      radial-gradient(1px 1px at  4% 48%, rgba(255,255,255,0.65) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 63%, rgba(255,255,255,0.88) 0%, transparent 100%),
      radial-gradient(1px 1px at 73% 28%, rgba(210,218,255,0.70) 0%, transparent 100%),
      radial-gradient(1px 1px at 19% 89%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(2px 2px at 96% 73%, rgba(255,255,255,0.80) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 18%, rgba(255,232,170,0.72) 0%, transparent 100%),
      radial-gradient(1px 1px at 63% 44%, rgba(255,255,255,0.58) 0%, transparent 100%),
      radial-gradient(1px 1px at 79% 88%, rgba(225,238,255,0.78) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 52%, rgba(255,248,225,0.62) 0%, transparent 100%),
      radial-gradient(3px 3px at  2%  2%, rgba(255,242,200,0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 77%  6%, rgba(255,255,255,0.70) 0%, transparent 100%),
      radial-gradient(1px 1px at 11% 34%, rgba(195,210,255,0.65) 0%, transparent 100%),
      radial-gradient(1px 1px at 57% 91%, rgba(255,255,255,0.60) 0%, transparent 100%),
      radial-gradient(2px 2px at 88% 55%, rgba(255,238,195,0.75) 0%, transparent 100%),
      radial-gradient(1px 1px at 36% 72%, rgba(255,255,255,0.50) 0%, transparent 100%);
    animation: twinkle 9s ease-in-out infinite alternate;
  }

  .star-layer:nth-child(2) {
    animation-delay: -4s; animation-duration: 13s;
    opacity: 0.52; transform: rotate(22deg) scale(1.28);
  }
  .star-layer:nth-child(3) {
    animation-delay: -8s; animation-duration: 17s;
    opacity: 0.32; transform: rotate(-14deg) scale(1.65);
  }

  @keyframes twinkle {
    0%   { opacity: 1; }
    42%  { opacity: 0.45; }
    100% { opacity: 0.88; }
  }

  /* Nebulae — amber forge, teal abyss, deep crimson: civilisation-scale energy */
  .nebula {
    position: absolute; border-radius: 50%;
    filter: blur(88px); pointer-events: none;
    animation: nebulaDrift 26s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }

  .nebula-1 {
    width: 720px; height: 300px; left: -200px; top: 16%;
    background: radial-gradient(ellipse, rgba(165,62,8,0.24), rgba(100,28,4,0.10), transparent 68%);
    animation-duration: 30s;
  }
  .nebula-2 {
    width: 520px; height: 520px; right: -100px; top: 4%;
    background: radial-gradient(ellipse, rgba(0,88,115,0.22), rgba(0,52,82,0.08), transparent 68%);
    animation-delay: -10s; animation-duration: 24s;
  }
  .nebula-3 {
    width: 820px; height: 160px; left: 18%; bottom: 20%;
    background: radial-gradient(ellipse, rgba(88,10,52,0.20), rgba(55,4,30,0.06), transparent 70%);
    animation-delay: -16s; animation-duration: 34s;
  }
  .nebula-4 {
    width: 380px; height: 380px; left: 40%; top: 22%;
    background: radial-gradient(ellipse, rgba(8,62,82,0.13), transparent 68%);
    animation-delay: -6s; animation-duration: 21s;
  }
  .nebula-5 {
    width: 300px; height: 200px; right: 25%; bottom: 30%;
    background: radial-gradient(ellipse, rgba(120,48,5,0.14), transparent 65%);
    animation-delay: -3s; animation-duration: 18s;
  }

  @keyframes nebulaDrift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(38px, 22px) scale(1.07); }
  }

  /* ========== CLOUD CANVAS ========== */
  #cloud-canvas {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  /* ========== UI PANEL ========== */
  #ui {
    position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    z-index: 10;
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  #ui.hidden {
    opacity: 0; pointer-events: none;
    transform: translateX(-50%) translateY(22px);
  }

  .panel {
    background: rgba(3, 2, 8, 0.78);
    border: 1px solid rgba(155, 85, 22, 0.20);
    border-top: 1px solid rgba(195, 122, 42, 0.28);
    backdrop-filter: blur(20px) saturate(1.5);
    border-radius: 3px;
    padding: 1.35rem 1.75rem 1.45rem;
    width: min(455px, 90vw);
    box-shadow:
      0 0 70px rgba(140,50,8,0.07),
      0 4px 40px rgba(0,0,0,0.70),
      inset 0 1px 0 rgba(245,185,90,0.055);
  }

  .panel-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.66rem;
    letter-spacing: 0.52em;
    color: rgba(195,130,52,0.50);
    text-align: center;
    margin-bottom: 0.95rem;
  }

  #poem-input {
    width: 100%;
    background: rgba(255,255,255,0.022);
    border: 1px solid rgba(255,255,255,0.065);
    border-bottom: 1px solid rgba(155,85,22,0.28);
    border-radius: 2px;
    color: rgba(238, 228, 205, 0.88);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem;
    font-weight: 300;
    line-height: 1.75;
    padding: 0.72rem 0.95rem;
    resize: none;
    height: 74px;
    outline: none;
    transition: border-color 0.35s, background 0.35s;
  }

  #poem-input::placeholder { color: rgba(155,138,108,0.28); font-style: italic; }
  #poem-input:focus {
    background: rgba(255,255,255,0.038);
    border-color: rgba(175,95,25,0.32);
    border-bottom-color: rgba(200,125,45,0.52);
  }

  .char-count {
    font-size: 0.63rem;
    color: rgba(135,115,85,0.38);
    text-align: right;
    margin-top: 0.32rem;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.06em;
  }
  .char-count.warn { color: rgba(200,95,55,0.62); }

  .btn-row { display: flex; gap: 0.65rem; margin-top: 0.85rem; align-items: center; }

  .btn-create {
    flex: 1;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.80rem;
    letter-spacing: 0.38em;
    color: rgba(218,160,72,0.88);
    background: rgba(135,55,8,0.10);
    border: 1px solid rgba(175,95,25,0.35);
    padding: 0.62em 1.4em;
    cursor: pointer;
    transition: all 0.32s;
    border-radius: 2px;
  }
  .btn-create:hover {
    background: rgba(155,65,12,0.20);
    border-color: rgba(208,125,45,0.62);
    color: rgba(238,185,95,1);
    box-shadow: 0 0 22px rgba(175,75,18,0.18);
  }
  .btn-create:active { transform: scale(0.97); }

  .btn-hide {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.76rem;
    letter-spacing: 0.24em;
    color: rgba(135,118,88,0.42);
    background: transparent;
    border: 1px solid rgba(135,118,88,0.14);
    padding: 0.62em 1.05em;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
    white-space: nowrap;
  }
  .btn-hide:hover { color: rgba(175,155,115,0.68); border-color: rgba(145,128,95,0.32); }

  /* Show button */
  #show-btn {
    position: fixed; bottom: 1.5rem; right: 1.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.70rem; letter-spacing: 0.24em;
    color: rgba(155,115,62,0.32);
    background: transparent;
    border: 1px solid rgba(135,95,35,0.14);
    padding: 0.48em 0.95em;
    cursor: pointer; transition: all 0.6s;
    opacity: 0; pointer-events: none;
    z-index: 20; border-radius: 2px;
  }
  #show-btn.visible { opacity: 1; pointer-events: all; }
  #show-btn:hover { color: rgba(198,155,82,0.72); border-color: rgba(175,125,52,0.32); }

  /* ========== FADE OVERLAY ========== */
  #fade-overlay {
    position: fixed; inset: 0; z-index: 99;
    background: #fff; pointer-events: none;
    opacity: 0; transition: opacity 1.5s ease;
  }
  #fade-overlay.active { opacity: 1; }

  /* Film grain atmosphere */
  #app::before {
    content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }
</style>
</head>
<body>

<!-- Fade overlay for transition -->
<div id="fade-overlay"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-title">Poetry Cloud</div>
  <div class="intro-sub">诗　云</div>
  <div class="intro-line"></div>
  <button id="enter-btn" onclick="enterApp()">E N T E R</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="sky">
    <div class="milkyway"></div>
    <div class="star-layer"></div>
    <div class="star-layer"></div>
    <div class="star-layer"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>
    <div class="nebula nebula-4"></div>
    <div class="nebula nebula-5"></div>
  </div>

  <canvas id="cloud-canvas"></canvas>

  <div id="ui">
    <div class="panel">
      <div class="panel-title">创　作　诗　云</div>
      <textarea id="poem-input" maxlength="60" placeholder="在此输入你的诗句…" oninput="updateCount()"></textarea>
      <div class="char-count" id="char-count">0 / 60</div>
      <div class="btn-row">
        <button class="btn-create" onclick="createCloud()">✦ 放　云</button>
        <button class="btn-hide" onclick="hideUI()">隐　藏</button>
      </div>
    </div>
  </div>

  <button id="show-btn" onclick="showUI()">诗云</button>
</div>

<script>
// ===== ENTER TRANSITION =====
function enterApp() {
  const overlay = document.getElementById('fade-overlay');
  overlay.classList.add('active');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    overlay.style.transition = 'opacity 2s ease';
    overlay.classList.remove('active');
    initCanvas();
  }, 1500);
}

// ===== CHAR COUNT =====
function updateCount() {
  const inp = document.getElementById('poem-input');
  const cc = document.getElementById('char-count');
  const len = inp.value.length;
  cc.textContent = `${len} / 60`;
  cc.classList.toggle('warn', len > 50);
}

// ===== HIDE / SHOW UI =====
function hideUI() {
  document.getElementById('ui').classList.add('hidden');
  const sb = document.getElementById('show-btn');
  sb.classList.add('visible');
}

function showUI() {
  document.getElementById('ui').classList.remove('hidden');
  document.getElementById('show-btn').classList.remove('visible');
}

// ===== STORAGE =====
const STORAGE_KEY = 'poetrycloud_poems';
function loadPoems() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function savePoem(text) {
  const poems = loadPoems();
  if (!poems.includes(text)) poems.push(text);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(poems));
}

// ===== CLOUD ENGINE =====
const clouds = [];
const pendingQueue = [];
const LANES = 12;
const laneY = [];
let canvasW, canvasH;
let animFrameId = null;

function initCanvas() {
  const canvas = document.getElementById('cloud-canvas');
  canvasW = canvas.width = window.innerWidth;
  canvasH = canvas.height = window.innerHeight;
  calcLanes();
  window.addEventListener('resize', () => {
    canvasW = canvas.width = window.innerWidth;
    canvasH = canvas.height = window.innerHeight;
    calcLanes();
  });
  // Restore saved poems with staggered entry
  const saved = loadPoems();
  saved.forEach((text, i) => {
    setTimeout(() => spawnCloud(text), i * 1800 + 400);
  });
  if (!animFrameId) animFrameId = requestAnimationFrame(animateClouds);
}

function calcLanes() {
  for (let i = 0; i < LANES; i++) {
    laneY[i] = (canvasH / (LANES + 1)) * (i + 1);
  }
}

// Find a free lane
function getFreeLane() {
  const activeLanes = new Set(clouds.map(c => c.lane));
  const free = [];
  for (let i = 0; i < LANES; i++) {
    if (!activeLanes.has(i)) free.push(i);
  }
  if (free.length === 0) {
    let best = -1, bestX = Infinity;
    for (const c of clouds) { if (c.x < bestX) { bestX = c.x; best = c.lane; } }
    return best;
  }
  return free[Math.floor(Math.random() * free.length)];
}

function spawnCloud(text) {
  const len = text.length;
  const fontSize = Math.max(14, Math.min(22, 13 + len * 0.18));
  const cloudW = Math.max(220, fontSize * len * 0.72 + 80);
  const cloudH = fontSize * 3.2 + 30;
  const lane = getFreeLane();
  clouds.push({
    text, cloudW, cloudH, fontSize,
    speed: 0.35 + Math.random() * 0.25,
    lane,
    x: canvasW + cloudW / 2 + 20,
    y: laneY[lane],
    opacity: 0,
    done: false,
  });
}

function createCloud() {
  const inp = document.getElementById('poem-input');
  const text = inp.value.trim();
  if (!text) return;
  savePoem(text);
  spawnCloud(text);
  inp.value = '';
  updateCount();
  if (!animFrameId) animFrameId = requestAnimationFrame(animateClouds);
}

function animateClouds() {
  const canvas = document.getElementById('cloud-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvasW, canvasH);
  const now = performance.now();

  // Spawn queued clouds
  for (let i = pendingQueue.length - 1; i >= 0; i--) {
    if (now >= pendingQueue[i].at) {
      spawnCloud(pendingQueue[i].text);
      pendingQueue.splice(i, 1);
    }
  }

  for (const c of clouds) {
    if (c.done) continue;
    c.x -= c.speed;
    if (c.x < canvasW - 20 && c.opacity < 1) c.opacity = Math.min(1, c.opacity + 0.018);
    if (c.x < -c.cloudW / 2 - 20) {
      c.opacity = Math.max(0, c.opacity - 0.02);
      if (c.opacity <= 0) {
        c.done = true;
        // Re-queue with 4–12s delay
        pendingQueue.push({ text: c.text, at: performance.now() + 4000 + Math.random() * 8000 });
      }
    }
    if (!c.done) drawCloud(ctx, c);
  }

  for (let i = clouds.length - 1; i >= 0; i--) {
    if (clouds[i].done) clouds.splice(i, 1);
  }

  animFrameId = requestAnimationFrame(animateClouds);
}

function drawCloud(ctx, c) {
  ctx.save();
  ctx.globalAlpha = c.opacity;

  const cx = c.x, cy = c.y;
  const w = c.cloudW, h = c.cloudH;

  // --- Wide atmospheric halo ---
  const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.78);
  halo.addColorStop(0,   'rgba(210,170,90,0.055)');
  halo.addColorStop(0.45,'rgba(180,130,60,0.028)');
  halo.addColorStop(1,   'transparent');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w * 0.78, h * 1.9, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- Fog body: layered horizontal ellipses fading at edges ---
  const fogLayers = [
    { rx: w * 0.50, ry: h * 0.52, ar: 0.038, ag: 0.032, ab: 0.018, blur: 32 },
    { rx: w * 0.46, ry: h * 0.42, ar: 0.060, ag: 0.048, ab: 0.024, blur: 20 },
    { rx: w * 0.42, ry: h * 0.34, ar: 0.090, ag: 0.072, ab: 0.035, blur: 12 },
    { rx: w * 0.38, ry: h * 0.26, ar: 0.130, ag: 0.108, ab: 0.052, blur: 6  },
    { rx: w * 0.33, ry: h * 0.18, ar: 0.175, ag: 0.148, ab: 0.072, blur: 2  },
  ];

  for (const fl of fogLayers) {
    ctx.save();
    ctx.shadowColor = `rgba(235,195,120,0.85)`;
    ctx.shadowBlur = fl.blur;
    const g = ctx.createLinearGradient(cx - fl.rx, cy, cx + fl.rx, cy);
    g.addColorStop(0,    'transparent');
    g.addColorStop(0.10, `rgba(235,200,135,${fl.ar * 0.45})`);
    g.addColorStop(0.30, `rgba(238,205,140,${fl.ar})`);
    g.addColorStop(0.50, `rgba(242,212,148,${fl.ar * 1.18})`);
    g.addColorStop(0.70, `rgba(238,205,140,${fl.ar})`);
    g.addColorStop(0.90, `rgba(235,200,135,${fl.ar * 0.45})`);
    g.addColorStop(1,    'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(cx, cy, fl.rx, fl.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // --- Luminous core strip ---
  ctx.save();
  ctx.shadowColor = 'rgba(255,225,160,0.6)';
  ctx.shadowBlur = 18;
  const core = ctx.createLinearGradient(cx - w * 0.28, cy, cx + w * 0.28, cy);
  core.addColorStop(0,    'transparent');
  core.addColorStop(0.15, 'rgba(255,235,175,0.10)');
  core.addColorStop(0.50, 'rgba(255,240,185,0.16)');
  core.addColorStop(0.85, 'rgba(255,235,175,0.10)');
  core.addColorStop(1,    'transparent');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w * 0.28, h * 0.10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // --- Wispy top puffs ---
  const numPuffs = Math.max(3, Math.floor(w / 42));
  for (let i = 0; i < numPuffs; i++) {
    const t = i / (numPuffs - 1 || 1);
    const px = cx - w * 0.36 + w * 0.72 * t;
    const pr = h * 0.20 + Math.sin(i * 1.9 + 0.5) * h * 0.055;
    const py = cy - h * 0.16 - pr * 0.28;
    ctx.save();
    ctx.shadowColor = 'rgba(240,205,130,0.7)';
    ctx.shadowBlur = 16;
    const pg = ctx.createRadialGradient(px, py, 0, px, py, pr);
    pg.addColorStop(0,   'rgba(242,210,138,0.16)');
    pg.addColorStop(0.5, 'rgba(238,205,132,0.07)');
    pg.addColorStop(1,   'transparent');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // --- Text: dark ink on warm cloud ---
  ctx.font = `300 ${c.fontSize}px "Noto Serif SC", serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Subtle warm glow behind text
  ctx.shadowColor = 'rgba(255,230,160,0.45)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = 'rgba(28, 18, 8, 0.82)';
  ctx.fillText(c.text, cx, cy + 1);

  ctx.restore();
}

function drawCloudShape() {} // unused, kept for compat

function wrapText(text, maxChars) {
  if (maxChars <= 0) maxChars = 1;
  const lines = [];
  for (let i = 0; i < text.length; i += maxChars) {
    lines.push(text.slice(i, i + maxChars));
  }
  return lines;
}

// Allow pressing Enter (not shift+enter) to create
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('poem-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      createCloud();
    }
  });
});
</script>
